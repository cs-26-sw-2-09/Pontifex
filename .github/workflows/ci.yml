# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
env:
  DATABASE_URL: postgres://user:password@localhost:5432/db-name

jobs:
  build:
    runs-on: ubuntu-latest

    # Add a PostgreSQL service container
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: db-name
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        node-version: [25.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      # Cache npm dependencies to speed up subsequent runs
      #- name: Cache dependencies
      #  uses: actions/cache@v3
      #  id: cache-npm
      #  with:
      #    path: ~/.npm # Path to cache (npm’s global cache directory)
      #    key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}-${{ github.ref_name }}-v1
      #    restore-keys: |
      #      ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}-v1
      #      ${{ runner.os }}-npm-v1

      - name: Install dependencies
        #  if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm install
      #- name: Debug cache
      #  run: echo "Cache hit ${{ steps.cache-npm.outputs.cache-hit }}"

      - name: Run tests
        run: npm run test

      - name: Run format
        run: npm run format

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build
